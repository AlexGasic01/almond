<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Almond</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #080808;
    --white: #ffffff;
    --gray: #888;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --border: rgba(255,255,255,0.07);
    --font: 'Inter', sans-serif;
  }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .content { position: relative; z-index: 1; max-width: 480px; }
  .logo { display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-bottom: 56px; }
  .logo svg { height: 24px; fill: var(--white); }
  .logo-word { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; }
  .code {
    font-size: clamp(80px, 15vw, 140px);
    font-weight: 800;
    letter-spacing: -6px;
    line-height: 1;
    color: #111;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }
  p {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--white); color: var(--black); border: none;
    padding: 12px 24px; font-family: var(--font); font-size: 13px; font-weight: 700;
    cursor: pointer; border-radius: 8px; text-decoration: none;
    transition: opacity 0.15s, transform 0.2s; letter-spacing: -0.2px;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-ghost {
    background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.12);
    padding: 12px 24px; font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; border-radius: 8px; text-decoration: none;
    transition: all 0.2s; letter-spacing: -0.2px;
  }
  .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
</style>
</head>
<body>
<div class="content">

    <span class="logo-word">Almond</span>

</html>
